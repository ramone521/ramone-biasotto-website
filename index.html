<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <title>Ramone Biasotto Advocacia | Direito Empresarial & LGPD</title>
    <meta name="description" content="Advocacia especializada em Direito Empresarial, LGPD e Proteção de Dados. Assessoria jurídica estratégica para empresas no Rio Grande do Sul." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ramone Biasotto Advocacia | Direito Empresarial & LGPD" />
    <meta property="og:description" content="Advocacia especializada em Direito Empresarial, LGPD e Proteção de Dados. Assessoria jurídica estratégica para empresas no Rio Grande do Sul." />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Ramone Biasotto Advocacia" />

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LegalService",
      "name": "Ramone Biasotto Advocacia",
      "description": "Advocacia especializada em Direito Empresarial, LGPD e Proteção de Dados.",
      "email": "ramonebiasotto.adv@outlook.com",
      "address": { "@type": "PostalAddress", "addressRegion": "RS", "addressCountry": "BR" },
      "founder": { "@type": "Person", "name": "Ramone Biasotto", "jobTitle": "Advogada" },
      "sameAs": [
        "https://instagram.com/dra.ramonebiasotto",
        "https://linkedin.com/in/ramone-biasotto",
        "https://youtube.com/@RamoneBiasottoAdv"
      ]
    }
    </script>

    <!-- AdOpt - LGPD Cookie Consent -->
    <meta name="adopt-website-id" content="dda549ef-bc80-4a8d-addd-7ab43980c9a4" />
    <script src="//tag.goadopt.io/injector.js?website_code=dda549ef-bc80-4a8d-addd-7ab43980c9a4" class="adopt-injector"></script>

    <!-- AdOpt - Override visual  -->
    <style>
     @media(min-width:1024px){
       #cookie-banner >div{
        padding: 10px 32px 20px;
      }
     }

     #cookie-banner >div{
        gap: 10px;
      }

      /* Oculta título "Controle sua privacidade" + branding AdOpt */
      #cookie-banner-title,
      #cookie-banner-title ~ div { display: none !important; }

      /* Oculta caixa de texto secundária
      #cookie-banner-comov2 { display: none !important; } */

      /* Texto principal */
      #cookie-banner-content {
        color: #555 !important;
        font-size: 14px !important;
        font-weight: 400 !important;
        line-height: 1.6 !important;
      }

      /* Links dentro do banner */
      #cookie-banner a { color: #B69B72 !important; font-weight: 600 !important; text-decoration: underline !important; }
      #cookie-banner a:hover { color: #9a825e !important; }

      /* Botão Aceitar */
      #adopt-accept-all-button {
        background: #B69B72 !important;
        border: 1.5px solid #B69B72 !important;
        color: #fff !important;
        border-radius: 8px !important;
        padding: 10px 20px !important;
        font-size: 14px !important;
        font-weight: 600 !important;
        cursor: pointer !important;
        transition: background 0.2s ease !important;
      }
      #adopt-accept-all-button:hover { background: #9a825e !important; border-color: #9a825e !important; }

      /* Botão Rejeitar */
      #adopt-reject-all-button {
        background: transparent !important;
        border: 1.5px solid #DEDEDE !important;
        color: #555 !important;
        border-radius: 8px !important;
        padding: 10px 20px !important;
        font-size: 14px !important;
        font-weight: 600 !important;
        cursor: pointer !important;
        transition: border-color 0.2s ease, color 0.2s ease !important;
      }
      #adopt-reject-all-button:hover { border-color: #B69B72 !important; color: #B69B72 !important; }

      /* Botão Minhas opções */
      #adopt-preferences-button {
        background: transparent !important;
        border: none !important;
        color: #B69B72 !important;
        font-size: 14px !important;
        font-weight: 600 !important;
        text-decoration: underline !important;
        text-underline-offset: 3px !important;
        cursor: pointer !important;
        padding: 10px 4px !important;
      }

      @media(max-width: 500px){
        #adopt-preferences-button{
          font-size: 12px !important;
        }

        #cookie-banner >div :nth-child(2){
          gap: 5px;
        }
      }
  

    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
